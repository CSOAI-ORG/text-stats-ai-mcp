name: text-stats-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: word_count
  description: Comprehensive word, character, sentence, and paragraph counting.
  parameters:
  - name: text
    type: string
    required: true
- name: reading_time
  description: Estimate reading time at given words-per-minute (default 238 adult
    average).
  parameters:
  - name: text
    type: string
    required: true
  - name: wpm
    type: integer
    required: false
- name: keyword_density
  description: Analyze keyword frequency and density in text.
  parameters:
  - name: text
    type: string
    required: true
  - name: top_n
    type: integer
    required: false
  - name: min_length
    type: integer
    required: false
- name: sentiment_score
  description: Basic sentiment analysis using lexicon-based scoring.
  parameters:
  - name: text
    type: string
    required: true
